# ==================================================
# VAIC 2026 - Docker Compose
# PHASE 7: đầy đủ 5 service — postgres, backend, ai-service, frontend, nginx.
# `docker compose up -d --build` khởi động toàn bộ hệ thống.
# ==================================================

services:
  # ---- Database: PostgreSQL 16 + pgvector (phục vụ RAG) ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vaic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-vaic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vaic_dev_password}
      POSTGRES_DB: ${DB_NAME:-vaic}
    ports:
      # Host 5433 -> container 5432 (tránh đụng PostgreSQL cài sẵn nếu có)
      - "5433:5432"
    volumes:
      - vaic_postgres_data:/var/lib/postgresql/data
      # Script khởi tạo extension chạy MỘT LẦN khi volume còn trống
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vaic} -d ${DB_NAME:-vaic}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Backend: NestJS API ----
  backend:
    build: ./backend
    container_name: vaic-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3100
      API_PREFIX: api/v1
      JWT_SECRET: ${JWT_SECRET:-vaic-dev-secret-change-me}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: 7
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-vaic}
      DB_PASSWORD: ${DB_PASSWORD:-vaic_dev_password}
      DB_NAME: ${DB_NAME:-vaic}
      LOG_LEVEL: ${LOG_LEVEL:-log}
      AI_SERVICE_BASE_URL: http://ai-service:8000
      AI_CHAT_TIMEOUT_MS: 20000
      AI_DOCUMENT_TIMEOUT_MS: 25000
      AI_SEARCH_TIMEOUT_MS: 8000
      AI_CIRCUIT_BREAKER_THRESHOLD: 5
      AI_CIRCUIT_BREAKER_RESET_MS: 30000
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_BYTES: 8388608
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
    ports:
      - "3100:3100"
    volumes:
      - vaic_backend_uploads:/app/uploads

  # ---- AI Service: FastAPI + RAG + LLM Adapter ----
  ai-service:
    build: ./ai-service
    container_name: vaic-ai-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${NODE_ENV:-production}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-30000}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-3}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE:-0.7}
      GEMINI_TOP_P: ${GEMINI_TOP_P:-0.95}
      GEMINI_TOP_K: ${GEMINI_TOP_K:-40}
      EMBEDDING_PROVIDER: e5
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      VOICE_ENGINE: browser
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-vaic}
      DB_PASSWORD: ${DB_PASSWORD:-vaic_dev_password}
      DB_NAME: ${DB_NAME:-vaic}
      BACKEND_BASE_URL: http://backend:3100/api/v1
    ports:
      - "8000:8000"

  # ---- Frontend: Next.js ----
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3100/api/v1}
    container_name: vaic-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:3001"

  # ---- Nginx: reverse proxy gateway (tùy chọn, cho demo/nộp bài) ----
  nginx:
    image: nginx:alpine
    container_name: vaic-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - ai-service
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  vaic_postgres_data:
  vaic_backend_uploads:
