# ==================================================
# VAIC 2026 - Docker Compose
# PHASE 1: chỉ PostgreSQL hoạt động (phục vụ migration/dev).
# Các service ứng dụng sẽ được bật ở PHASE 8 (Deployment).
# ==================================================

services:
  # ---- Database: PostgreSQL 16 + pgvector (phục vụ RAG) ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vaic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-vaic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vaic_dev_password}
      POSTGRES_DB: ${DB_NAME:-vaic}
    ports:
      # Host 5433 -> container 5432 (tránh đụng PostgreSQL cài sẵn nếu có)
      - "5433:5432"
    volumes:
      - vaic_postgres_data:/var/lib/postgresql/data
      # Script khởi tạo extension chạy MỘT LẦN khi volume còn trống
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vaic} -d ${DB_NAME:-vaic}"]
      interval: 5s
      timeout: 3s
      retries: 10

