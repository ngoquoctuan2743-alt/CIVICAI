# ==================================================
# VAIC 2026 - Nginx Gateway (PHASE 7 Release Candidate)
# Reverse proxy: / -> frontend, /api -> backend, /ai -> ai-service
# ==================================================

events {}

http {
  upstream frontend   { server frontend:3001; }
  upstream backend    { server backend:3100; }
  upstream ai_service { server ai-service:8000; }

  server {
    listen 80;
    client_max_body_size 20M;   # cho phép upload ảnh giấy tờ

    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
    }

    location /ai/ {
      proxy_pass http://ai_service/;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }
  }
}
