name: CI

# Chuẩn bị cấu trúc CI/CD (PROMPT 22) — build + test 3 service trên mỗi push/PR.
# Không deploy (ngoài phạm vi MVP) — chỉ đảm bảo build/test không lỗi trước khi merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vaic
          POSTGRES_PASSWORD: vaic_dev_password
          POSTGRES_DB: vaic
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U vaic -d vaic"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run migrations
        run: npm run migration:run
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: vaic
          DB_PASSWORD: vaic_dev_password
          DB_NAME: vaic
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
      - name: Test
        run: npm test -- --silent
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: vaic
          DB_PASSWORD: vaic_dev_password
          DB_NAME: vaic
          NODE_ENV: test
          JWT_SECRET: ci-test-secret

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -q
